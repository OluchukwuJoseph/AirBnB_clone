<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* reset the padding and margin of all elements */
    * {
      padding: 0;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #FF0000;
      height: 70px;
    }

    section {
      flex: 1;
    }

    footer {
      background-color: #00FF00;
      height: 60px;
      display: flex;
    }

    p {
      margin: auto;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
  </header>
  <section>
  </section>
  <footer>
    <p>
      Best School
    </p>
  </footer>
</body>
</html>
